<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Intention Review — Round 4</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f0ea; color: #3a3028; padding: 24px 20px 60px; max-width: 600px; margin: 0 auto; }
  h1 { font-size: 22px; color: #2d3a2e; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #9a8a7a; margin-bottom: 24px; line-height: 1.5; }
  .phase { margin-bottom: 28px; }
  .phase-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #e8a0b0; font-weight: bold; margin-bottom: 10px; }
  label { display: flex; align-items: flex-start; gap: 12px; padding: 11px 14px; background: #fff; border: 2px solid #e8e0d8; border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 14px; line-height: 1.45; transition: border-color 0.15s, background 0.15s; }
  label:hover { border-color: #e8a0b0; }
  input[type=checkbox] { appearance: none; width: 18px; height: 18px; border: 2px solid #d0c8bc; border-radius: 5px; flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all 0.15s; }
  input[type=checkbox]:checked { background: #e8a0b0; border-color: #e8a0b0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 5l3.5 3.5L11 1' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-size: 11px 9px; background-repeat: no-repeat; background-position: center; }
  label:has(input:checked) { border-color: #e8a0b0; background: #faeef1; }
  #result { margin-top: 32px; padding: 16px 18px; background: #2d3a2e; color: #e8dfd0; border-radius: 12px; font-size: 13px; line-height: 1.6; display: none; }
  #result h2 { font-size: 14px; color: #e8a0b0; margin-bottom: 10px; }
  .count { font-size: 12px; color: #9a8a7a; margin-bottom: 16px; margin-top: 4px; }
  button { margin-top: 20px; width: 100%; padding: 14px; background: #e8a0b0; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-family: Georgia, serif; font-weight: bold; cursor: pointer; }
  button:hover { background: #d990a0; }
  #copy-btn { background: #5a9e8a; margin-top: 10px; font-size: 13px; padding: 10px; }
</style>
</head>
<body>
<h1>Intention Review — Round 4</h1>
<p class="subtitle">Tight. One sentence. Check what sounds like you.</p>

<div class="phase">
  <div class="phase-label">Phase 1 — Starting out</div>
  <label><input type="checkbox" value="Lower the bar. Step over it. Repeat."> Lower the bar. Step over it. Repeat.</label>
  <label><input type="checkbox" value="Done is a perfect score. Show your work."> Done is a perfect score. Show your work.</label>
  <label><input type="checkbox" value="The minimum effective dose is: starting."> The minimum effective dose is: starting.</label>
  <label><input type="checkbox" value="Messy reps count. Technically and officially."> Messy reps count. Technically and officially.</label>
  <label><input type="checkbox" value="Just start. Optimize later."> Just start. Optimize later.</label>
  <label><input type="checkbox" value="The warmup counts. Every single time."> The warmup counts. Every single time.</label>
  <label><input type="checkbox" value="Proof by induction: you started once, therefore you can start again. QED."> Proof by induction: you started once, therefore you can start again. QED.</label>
  <label><input type="checkbox" value="Ankle mob at minimum. The rest is extra credit."> Ankle mob at minimum. The rest is extra credit.</label>
</div>

<div class="phase">
  <div class="phase-label">Phase 2 — Building the habit</div>
  <label><input type="checkbox" value="You're proving a theorem about yourself. It's going well!"> You're proving a theorem about yourself. It's going well!</label>
  <label><input type="checkbox" value="Habit: noun. Something you do before your brain files an objection."> Habit: noun. Something you do before your brain files an objection.</label>
  <label><input type="checkbox" value="The streak is a side effect. The showing up is the data."> The streak is a side effect. The showing up is the data.</label>
  <label><input type="checkbox" value="Consistency is just repetition until the question becomes boring."> Consistency is just repetition until the question becomes boring.</label>
  <label><input type="checkbox" value="It gets easier. The timeline is a little annoying, but the math is real."> It gets easier. The timeline is a little annoying, but the math is real.</label>
  <label><input type="checkbox" value="Your future self is rooting for you. Annoyingly."> Your future self is rooting for you. Annoyingly.</label>
  <label><input type="checkbox" value="You're becoming someone who does this. She's great, by the way."> You're becoming someone who does this. She's great, by the way.</label>
  <label><input type="checkbox" value="Any improvement is technically infinite percent better than zero. Do the math!"> Any improvement is technically infinite percent better than zero. Do the math!</label>
</div>

<div class="phase">
  <div class="phase-label">Phase 3 — Quality & connection</div>
  <label><input type="checkbox" value="Slow is correct. Correct is the whole assignment."> Slow is correct. Correct is the whole assignment.</label>
  <label><input type="checkbox" value="Find your glute. Introduce yourself."> Find your glute. Introduce yourself.</label>
  <label><input type="checkbox" value="Squeeze the right glute like it owes you money."> Squeeze the right glute like it owes you money.</label>
  <label><input type="checkbox" value="Your nervous system is taking notes. Make them good."> Your nervous system is taking notes. Make them good.</label>
  <label><input type="checkbox" value="This is where you talk to your body. Weird, but it works."> This is where you talk to your body. Weird, but it works.</label>
  <label><input type="checkbox" value="Mind-muscle connection: not mystical. Just pay attention."> Mind-muscle connection: not mystical. Just pay attention.</label>
  <label><input type="checkbox" value="The derivative of showing up is momentum."> The derivative of showing up is momentum.</label>
  <label><input type="checkbox" value="Form is free gains. Sloppy is just sloppy with extra steps."> Form is free gains. Sloppy is just sloppy with extra steps.</label>
</div>

<div class="phase">
  <div class="phase-label">Phase 4 — Maintenance</div>
  <label><input type="checkbox" value="You didn't quit. That's great data."> You didn't quit. That's great data.</label>
  <label><input type="checkbox" value="Strong enough to do the thing. That was always the rubric."> Strong enough to do the thing. That was always the rubric.</label>
  <label><input type="checkbox" value="Maintenance: the underrated third act."> Maintenance: the underrated third act.</label>
  <label><input type="checkbox" value="Training to be functional at 80. Respect the timeline."> Training to be functional at 80. Respect the timeline.</label>
  <label><input type="checkbox" value="The reps compound. So do you."> The reps compound. So do you.</label>
  <label><input type="checkbox" value="You are a variable with unlimited potential. Solve for you!"> You are a variable with unlimited potential. Solve for you!</label>
</div>

<div class="phase">
  <div class="phase-label">Any phase</div>
  <label><input type="checkbox" value="Functional beats perfect. Proven repeatedly."> Functional beats perfect. Proven repeatedly.</label>
  <label><input type="checkbox" value="Showing up ugly still counts. The bar doesn't grade on aesthetics."> Showing up ugly still counts. The bar doesn't grade on aesthetics.</label>
  <label><input type="checkbox" value="Good enough is a legitimate grade."> Good enough is a legitimate grade.</label>
  <label><input type="checkbox" value="No late penalties here. Just start tomorrow."> No late penalties here. Just start tomorrow.</label>
  <label><input type="checkbox" value="You're not behind. There's no curve. There's just next."> You're not behind. There's no curve. There's just next.</label>
  <label><input type="checkbox" value="Every rep is data. All of it counts."> Every rep is data. All of it counts.</label>
  <label><input type="checkbox" value="Progress is embarrassingly nonlinear. Keep going."> Progress is embarrassingly nonlinear. Keep going.</label>
  <label><input type="checkbox" value="The slope of your effort is positive. That's the whole graph."> The slope of your effort is positive. That's the whole graph.</label>
  <label><input type="checkbox" value="You did the thing. Kind of impressive, honestly."> You did the thing. Kind of impressive, honestly.</label>
</div>

<div class="count" id="count">0 selected</div>
<button onclick="showResults()">Show my keepers →</button>

<div id="result">
  <h2>Your keepers</h2>
  <div id="result-list"></div>
  <button id="copy-btn" onclick="copyResults()">Copy list</button>
</div>

<script>
  var boxes = document.querySelectorAll('input[type=checkbox]');
  boxes.forEach(function(b){ b.addEventListener('change', updateCount); });
  function updateCount(){
    var n = [...boxes].filter(b=>b.checked).length;
    document.getElementById('count').textContent = n + ' selected';
  }
  function showResults(){
    var kept = [...boxes].filter(b=>b.checked).map(b=>b.value);
    var div = document.getElementById('result-list');
    if(!kept.length){ div.textContent = 'Nothing selected yet.'; }
    else { div.innerHTML = kept.map(t=>'• '+t).join('<br><br>'); }
    var r = document.getElementById('result');
    r.style.display = 'block';
    r.scrollIntoView({behavior:'smooth'});
  }
  function copyResults(){
    var kept = [...boxes].filter(b=>b.checked).map(b=>b.value);
    navigator.clipboard.writeText(kept.join('\n')).then(function(){
      document.getElementById('copy-btn').textContent = 'Copied!';
      setTimeout(function(){ document.getElementById('copy-btn').textContent = 'Copy list'; }, 2000);
    });
  }
</script>
</body>
</html>
