<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Lower the Bar</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Movement" />
<meta name="theme-color" content="#2d3a2e" />
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Lower%20the%20Bar%22%2C%22short_name%22%3A%22Movement%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f0ea%22%2C%22theme_color%22%3A%22%232d3a2e%22%7D" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #2d3a2e; overscroll-behavior: none; -webkit-text-size-adjust: 100%; height: 100%; }
  body { font-family: Georgia, 'Times New Roman', serif; color: #3a3028; overflow: hidden; }
  #app { background: #f5f0ea; height: 100%; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
  button { font-family: inherit; cursor: pointer; }
  textarea { font-family: inherit; }
  .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .scroll-x::-webkit-scrollbar { display: none; }
  .fade { animation: fade 0.25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
  .shake { animation: shake 0.3s ease-in-out; }
  #app:empty::after { content: "Loading your plan\2026"; color: #9ab090; display: block; text-align: center; padding-top: 40vh; font-size: 14px; }
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js?v=13"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("/lower-the-bar/sw.js", { scope: "/lower-the-bar/" })
      .then(function(reg){
        // Force an immediate check for a new service worker on every load.
        // Without this, the browser only checks in the background and the
        // new version won't load until the user closes all tabs and reopens.
        reg.update();
      })
      .catch(function(){});

    // When a new service worker takes control (after skipWaiting + clients.claim),
    // reload the page so the user gets the fresh files immediately.
    navigator.serviceWorker.addEventListener("controllerchange", function(){
      window.location.reload();
    });
  });
}
</script>
</body>
</html>
